repoEmptyMarkdown: |
  ## このリポジトリは空です

  ### 始めましょう

  [新しいファイル](NEW_FILE_URL)を作成する。
repoEmptyMarkdownClone: |
  ### またはこのリポジトリをクローン

  HTTPS でクローン
  ```sh
  git clone REPO_URL
  ```
repoEmptyMarkdownClonePush: |
  次にコンテンツをプッシュします。

  ```sh
  cd REPO_NAME
  git branch -M DEFAULT_BRANCH
  echo "# Hello World" >> README.md
  git add README.md
  git commit -m "Initial commit"
  git push -u origin DEFAULT_BRANCH
  ```
repoEmptyMarkdownExisting: |
  ### または既存のリポジトリをプッシュ

  ```sh
  git remote add origin REPO_URL
  git branch -M DEFAULT_BRANCH
  git push -u origin DEFAULT_BRANCH
  ```

  このリポジトリにプルまたはプッシュするには、[API トークンの作成](CREATE_API_TOKEN_URL)が必要な場合があります。
