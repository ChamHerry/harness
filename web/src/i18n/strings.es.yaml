repoEmptyMarkdown: |
  ## Este repositorio está vacío

  ### Comience por

  Creando [un nuevo archivo](NEW_FILE_URL).
repoEmptyMarkdownClone: |
  ### O puede clonar este repositorio

  Clonar con HTTPS
  ```sh
  git clone REPO_URL
  ```
repoEmptyMarkdownClonePush: |
  Luego haga push de algún contenido.

  ```sh
  cd REPO_NAME
  git branch -M DEFAULT_BRANCH
  echo "# Hello World" >> README.md
  git add README.md
  git commit -m "Initial commit"
  git push -u origin DEFAULT_BRANCH
  ```
repoEmptyMarkdownExisting: |
  ### O puede hacer push de un repositorio existente

  ```sh
  git remote add origin REPO_URL
  git branch -M DEFAULT_BRANCH
  git push -u origin DEFAULT_BRANCH
  ```

  Puede que necesite [crear un token de API](CREATE_API_TOKEN_URL) para hacer pull o push a este repositorio.
