  subTitle: >-
    Exencion allow temporary use of blocked dependencies when business-critical. When you submit a request, all users with the "Exencion
    Approver" role will be notified. Any approver can review and act on your request.
  basicInformationSection:
    title: Basic Informatoion
    packageName: Package Nombre
    version: Version
  exemptionDetailsAndJustificationSection:
